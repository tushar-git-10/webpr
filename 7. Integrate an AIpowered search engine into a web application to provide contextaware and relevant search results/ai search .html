<!DOCTYPE html>
<html>
<body style="text-align:center; font-family:Arial;">

<h2>AI Search Engine 🔍🤖</h2>

<input id="search" placeholder="Try: I want something for music" >
<button onclick="find()">Search</button>

<p id="result"></p>

<script>

function find() {

  let input = document.getElementById("search").value.toLowerCase();
  let ans = "No result found 😅";

  // 📱 PHONE
  if (
    input.includes("phone") ||
    input.includes("mobile") ||
    input.includes("smartphone") ||
    input.includes("call") ||
    input.includes("android")
  ) {
    ans = "Phone 📱";
  }

  // 💻 LAPTOP
  else if (
    input.includes("laptop") ||
    input.includes("computer") ||
    input.includes("pc") ||
    input.includes("study") ||
    input.includes("work") ||
    input.includes("coding")
  ) {
    ans = "Laptop 💻";
  }

  // 🎧 HEADPHONES
  else if (
    input.includes("headphones") ||
    input.includes("earphones") ||
    input.includes("earbuds") ||
    input.includes("music") ||
    input.includes("song") ||
    input.includes("listen")
  ) {
    ans = "Headphones 🎧";
  }

  // 👟 SHOES
  else if (
    input.includes("shoes") ||
    input.includes("footwear") ||
    input.includes("running") ||
    input.includes("sports") ||
    input.includes("walking")
  ) {
    ans = "Shoes 👟";
  }

  // 🔌 CHARGER
  else if (
    input.includes("charger") ||
    input.includes("charging") ||
    input.includes("battery") ||
    input.includes("power") ||
    input.includes("adapter")
  ) {
    ans = "Charger 🔌";
  }

  // 🖱️ MOUSE
  else if (
    input.includes("mouse") ||
    input.includes("pointer") ||
    input.includes("click") ||
    input.includes("cursor")
  ) {
    ans = "Mouse 🖱️";
  }

  document.getElementById("result").innerText = "Result: " + ans;
}

</script>

</body>
</html>
