<!DOCTYPE html>
<html>
<body style="text-align:center">

<h2>🎤 Voice App</h2>

<button onclick="start()">Speak 🎙️</button><br><br>

<textarea id="t"></textarea><br><br>

<button onclick="speak()">🔊 Speak</button>

<script>
const SpeechRecognition = window.SpeechRecognition ;

function start(){
  let r = new SpeechRecognition();
  r.lang = "en-US";
  r.onresult = e => t.value = e.results[0][0].transcript;
  r.start();
}

function speak(){
  speechSynthesis.speak(new SpeechSynthesisUtterance(t.value));
}
</script>

</body>
</html>
